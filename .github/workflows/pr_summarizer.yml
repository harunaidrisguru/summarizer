name: HuggingFace PR Summarizer

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summarize:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write # Gives the script permission to post comments
      contents: read       # Gives the script permission to read the PR code changes

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install huggingface_hub PyGitHub

      - name: Run Summarizer Script
        env:
          INPUT_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_HF_TOKEN: ${{ secrets.HF_TOKEN }}
          INPUT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: python summarizer.py
